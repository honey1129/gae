<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHADOW CAT — Ninja Runner</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --black: #0a0a0f;
  --dark: #12121a;
  --panel: #1a1a28;
  --purple: #7b2fff;
  --purple-light: #a55fff;
  --yellow: #f5c400;
  --cyan: #00f5ff;
  --pink: #ff2d78;
  --white: #e8e8ff;
}

body {
  background: var(--black);
  color: var(--white);
  font-family: 'Press Start 2P', monospace;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
  user-select: none;
}

/* Grid bg */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(123,47,255,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(123,47,255,0.06) 1px, transparent 1px);
  background-size: 32px 32px;
  pointer-events: none;
}

/* Scanlines */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px
  );
  pointer-events: none;
}

#gameWrapper {
  position: relative;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

/* Header bar */
#header {
  width: 800px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: var(--panel);
  border: 3px solid var(--purple);
  border-bottom: none;
  box-shadow: 6px 0 0 #000, -6px 0 0 #000, 0 -6px 0 #000;
}

.header-logo {
  font-size: 12px;
  color: var(--yellow);
  text-shadow: 2px 2px 0 #000, 0 0 16px rgba(245,196,0,0.5);
  letter-spacing: 2px;
}
.header-logo span { color: var(--purple-light); }

#scoreBoard {
  display: flex;
  gap: 24px;
  align-items: center;
}

.score-item {
  text-align: center;
}
.score-label { font-size: 5px; color: rgba(232,232,255,0.4); letter-spacing: 1px; display: block; margin-bottom: 3px; }
.score-val { font-size: 11px; color: var(--yellow); text-shadow: 1px 1px 0 #000; }

#livesDisplay { display: flex; gap: 4px; align-items: center; }
.life-icon { font-size: 12px; }

/* Main canvas */
#gameCanvas {
  display: block;
  border: 3px solid var(--purple);
  border-top: 2px solid var(--purple-light);
  border-bottom: none;
  box-shadow:
    6px 0 0 #000, -6px 0 0 #000,
    0 0 40px rgba(123,47,255,0.3),
    inset 0 0 60px rgba(0,0,0,0.5);
  image-rendering: pixelated;
  cursor: pointer;
}

/* Bottom bar */
#footer {
  width: 800px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px;
  background: var(--panel);
  border: 3px solid var(--purple);
  border-top: 2px solid rgba(123,47,255,0.4);
  box-shadow: 6px 0 0 #000, -6px 0 0 #000, 0 6px 0 #000;
}

.ctrl-hint { font-size: 6px; color: rgba(232,232,255,0.4); letter-spacing: 1px; }
.ctrl-hint span { color: var(--cyan); }

/* Overlay screens */
#overlay {
  position: absolute;
  top: 3px; /* below header border */
  width: 800px;
  height: 400px;
  background: rgba(10,10,15,0.92);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  z-index: 20;
  margin-top: 57px; /* header height */
}

#overlay.hidden { display: none; }

.overlay-title {
  font-size: 28px;
  text-shadow: 4px 4px 0 #000;
  text-align: center;
  line-height: 1.4;
}

.overlay-sub {
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  color: rgba(232,232,255,0.6);
  text-align: center;
  line-height: 2;
}

.overlay-btn {
  background: var(--yellow);
  color: #000;
  border: none;
  padding: 14px 28px;
  font-family: 'Press Start 2P', monospace;
  font-size: 11px;
  cursor: pointer;
  box-shadow: 6px 6px 0 #000, 0 0 24px rgba(245,196,0,0.4);
  transition: all 0.1s;
  letter-spacing: 1px;
  animation: pulse-btn 1.5s ease-in-out infinite;
}

@keyframes pulse-btn {
  0%, 100% { transform: scale(1); box-shadow: 6px 6px 0 #000, 0 0 24px rgba(245,196,0,0.4); }
  50% { transform: scale(1.04); box-shadow: 6px 6px 0 #000, 0 0 40px rgba(245,196,0,0.7); }
}

.overlay-btn:hover {
  animation: none;
  transform: translate(-3px,-3px);
  box-shadow: 9px 9px 0 #000, 0 0 40px rgba(245,196,0,0.7);
}

.overlay-score-big {
  font-size: 36px;
  color: var(--yellow);
  text-shadow: 4px 4px 0 #000, 0 0 30px rgba(245,196,0,0.6);
}

.overlay-hi {
  font-size: 9px;
  color: var(--cyan);
  text-shadow: 0 0 10px var(--cyan);
}

.nft-promo {
  font-size: 6px;
  color: var(--purple-light);
  border: 1px solid var(--purple);
  padding: 8px 16px;
  background: rgba(123,47,255,0.1);
  text-align: center;
  letter-spacing: 1px;
}

/* Mobile touch controls */
#mobileControls {
  display: none;
  gap: 16px;
  margin-top: 12px;
}

.touch-btn {
  background: var(--panel);
  border: 3px solid var(--purple);
  color: var(--white);
  width: 70px; height: 70px;
  font-family: 'Press Start 2P', monospace;
  font-size: 20px;
  cursor: pointer;
  box-shadow: 4px 4px 0 #000;
  -webkit-tap-highlight-color: transparent;
  transition: all 0.05s;
}

.touch-btn:active {
  transform: translate(2px,2px);
  box-shadow: 2px 2px 0 #000;
  background: var(--purple);
}

@media (max-width: 820px) {
  #gameWrapper, #header, #footer, #overlay { width: 100vw; }
  #gameCanvas { width: 100vw !important; height: auto !important; }
  #mobileControls { display: flex; }
  .overlay-title { font-size: 18px; }
}

/* Combo popup */
#comboPopup {
  position: absolute;
  pointer-events: none;
  font-size: 10px;
  color: var(--yellow);
  text-shadow: 2px 2px 0 #000, 0 0 12px rgba(245,196,0,0.8);
  z-index: 30;
  transition: none;
  display: none;
  margin-top: 57px;
}
</style>
</head>
<body>

<div id="gameWrapper">
  <!-- Header -->
  <div id="header">
    <div class="header-logo">SHADOW<span>CAT</span></div>
    <div id="scoreBoard">
      <div class="score-item">
        <span class="score-label">SCORE</span>
        <span class="score-val" id="scoreDisplay">00000</span>
      </div>
      <div class="score-item">
        <span class="score-label">BEST</span>
        <span class="score-val" id="hiDisplay">00000</span>
      </div>
      <div class="score-item">
        <span class="score-label">COMBO</span>
        <span class="score-val" id="comboDisplay" style="color:var(--cyan)">x1</span>
      </div>
      <div id="livesDisplay">
        <span class="score-label" style="margin-right:4px">LIVES</span>
        <span class="life-icon" id="life1">🐱</span>
        <span class="life-icon" id="life2">🐱</span>
        <span class="life-icon" id="life3">🐱</span>
      </div>
    </div>
  </div>

  <!-- Canvas -->
  <canvas id="gameCanvas" width="800" height="400"></canvas>

  <!-- Footer -->
  <div id="footer">
    <span class="ctrl-hint"><span>SPACE / ↑</span> 跳跃 &nbsp; <span>↓ / S</span> 俯冲 &nbsp; <span>Z / X</span> 攻击</span>
    <span class="ctrl-hint" style="color:var(--purple-light)">SHADOW CAT NFT © 2025</span>
    <span class="ctrl-hint">收集 <span>⭐</span> 加速 &nbsp; <span>💎</span> 无敌</span>
  </div>

  <!-- Overlay -->
  <div id="overlay">
    <div class="overlay-title" style="color:var(--yellow)">SHADOW CAT</div>
    <div class="overlay-title" style="font-size:14px; color:var(--white)">NINJA RUNNER</div>
    <div class="overlay-sub">
      跳跃躲避障碍 · 收集宝石 · 击败忍者犬<br>
      连击越多，分数越高！
    </div>
    <button class="overlay-btn" id="startBtn" onclick="startGame()">▶ START GAME</button>
    <div class="nft-promo">★ 得分 > 5000 解锁专属 NFT 优惠码 ★</div>
  </div>

  <!-- Combo popup -->
  <div id="comboPopup"></div>

  <!-- Mobile controls -->
  <div id="mobileControls">
    <button class="touch-btn" ontouchstart="handleTouch('duck')" ontouchend="handleTouchEnd('duck')">▼</button>
    <button class="touch-btn" ontouchstart="handleTouch('jump')">▲</button>
    <button class="touch-btn" ontouchstart="handleTouch('attack')">⚔</button>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

// ─── CONSTANTS ───────────────────────────────────────────
const W = 800, H = 400;
const GROUND = H - 80;
const GRAVITY = 0.6;
const JUMP_FORCE = -13;
const SCROLL_SPEED_INIT = 4;

// ─── STATE ────────────────────────────────────────────────
let gameState = 'idle'; // idle | playing | dead | win
let score = 0, hiScore = parseInt(localStorage.getItem('scHi') || '0');
let lives = 3, combo = 1, comboTimer = 0;
let scrollSpeed = SCROLL_SPEED_INIT;
let frame = 0, distance = 0;
let invincible = 0, flashTimer = 0;
let shakeX = 0, shakeTimer = 0;
let particles = [], pickups = [], obstacles = [], clouds = [], ninjas = [];
let bgStars = [];
let attackTimer = 0;
let attackCooldown = 0;

// Cat sprite state
const cat = {
  x: 120, y: GROUND, vy: 0,
  w: 40, h: 48,
  grounded: true,
  jumping: false,
  ducking: false,
  attacking: false,
  attackFrame: 0,
  animFrame: 0,
  animTimer: 0,
  trail: []
};

// ─── INIT STARS ───────────────────────────────────────────
function initStars() {
  bgStars = [];
  for (let i = 0; i < 60; i++) {
    bgStars.push({
      x: Math.random() * W,
      y: Math.random() * (GROUND - 60),
      r: Math.random() < 0.2 ? 2 : 1,
      spd: Math.random() * 0.3 + 0.1,
      bright: Math.random()
    });
  }
}

// Init clouds
function initClouds() {
  clouds = [];
  for (let i = 0; i < 5; i++) {
    clouds.push({
      x: Math.random() * W,
      y: 40 + Math.random() * 80,
      w: 60 + Math.random() * 80,
      spd: 0.4 + Math.random() * 0.4,
      alpha: 0.08 + Math.random() * 0.1
    });
  }
}

// ─── PIXEL ART HELPERS ───────────────────────────────────
function px(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.round(x), Math.round(y), w, h);
}

// Draw pixelated cat
function drawCat(x, y, frame, ducking, attacking, invincible, attackDir) {
  if (invincible && Math.floor(Date.now() / 80) % 2 === 0) return;

  const f = Math.floor(frame / 6) % 4; // walk cycle
  const ax = Math.round(x), ay = Math.round(y);

  if (ducking) {
    // Duck pose - squished cat
    // Body
    px(ax+4,  ay+28, 32, 14, '#1a1a2e');
    px(ax+6,  ay+30, 28, 10, '#0d0d1a');
    // Eyes
    px(ax+8,  ay+30, 4, 4, '#f5c400');
    px(ax+24, ay+30, 4, 4, '#f5c400');
    px(ax+10, ay+31, 2, 2, '#000');
    px(ax+26, ay+31, 2, 2, '#000');
    // Tail
    px(ax+34, ay+34, 8, 4, '#1a1a2e');
    px(ax+40, ay+30, 6, 4, '#7b2fff');
    // Cloak
    px(ax+4,  ay+32, 32, 8, '#5a1fb5');
    px(ax+6,  ay+34, 30, 6, '#7b2fff');
    return;
  }

  const bounce = Math.sin(frame * 0.25) * 2;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(ax+20, ay+48, 16, 4, 0, 0, Math.PI*2);
  ctx.fill();

  // Cloak / body base
  px(ax+6,  ay+20+bounce, 28, 24, '#3d1280');
  px(ax+4,  ay+24+bounce, 32, 20, '#5a1fb5');
  px(ax+6,  ay+26+bounce, 28, 16, '#7b2fff');

  // Cloak bottom flutter
  const flutter = Math.sin(frame * 0.3) * 3;
  px(ax+4,  ay+38+bounce+flutter, 8, 6, '#5a1fb5');
  px(ax+28, ay+38+bounce-flutter, 8, 6, '#5a1fb5');

  // White straps
  px(ax+16, ay+28+bounce, 4, 12, '#c8c8ff');
  px(ax+20, ay+28+bounce, 4, 12, '#c8c8ff');

  // Head
  px(ax+6,  ay+2+bounce,  28, 22, '#0d0d1a');
  px(ax+8,  ay,           24, 24, '#1a1a2e');
  px(ax+10, ay+2+bounce,  20, 20, '#0d0d1a');

  // Ears
  px(ax+8,  ay-6+bounce,  6, 8, '#0d0d1a');
  px(ax+26, ay-6+bounce,  6, 8, '#0d0d1a');
  px(ax+9,  ay-4+bounce,  4, 4, '#3d1280');
  px(ax+27, ay-4+bounce,  4, 4, '#3d1280');

  // Halo accessory
  px(ax+10, ay-10+bounce, 20, 3, '#f5c400');
  px(ax+12, ay-11+bounce, 16, 2, '#ffd740');
  ctx.fillStyle = 'rgba(245,196,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(ax+20, ay-10+bounce, 10, 2, 0, 0, Math.PI*2);
  ctx.fill();

  // Eyes - golden glow
  px(ax+10, ay+8+bounce,  6, 6, '#f5c400');
  px(ax+24, ay+8+bounce,  6, 6, '#f5c400');
  px(ax+11, ay+9+bounce,  4, 4, '#ffd740');
  px(ax+25, ay+9+bounce,  4, 4, '#ffd740');
  px(ax+12, ay+10+bounce, 2, 2, '#000');
  px(ax+26, ay+10+bounce, 2, 2, '#000');

  // Eye glow
  ctx.fillStyle = 'rgba(245,196,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(ax+13, ay+11+bounce, 5, 4, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(ax+27, ay+11+bounce, 5, 4, 0, 0, Math.PI*2);
  ctx.fill();

  // Nose / whiskers
  px(ax+18, ay+14+bounce, 4, 3, '#3d1280');
  px(ax+6,  ay+15+bounce, 10, 1, 'rgba(200,200,255,0.4)');
  px(ax+24, ay+15+bounce, 10, 1, 'rgba(200,200,255,0.4)');

  // Legs (walk animation)
  const legOff = Math.sin(frame * 0.4) * 5;
  px(ax+8,  ay+42+bounce+legOff,  8, 10, '#0d0d1a');
  px(ax+24, ay+42+bounce-legOff,  8, 10, '#0d0d1a');
  // Feet
  px(ax+6,  ay+50+bounce+legOff,  12, 4, '#1a1a2e');
  px(ax+22, ay+50+bounce-legOff,  12, 4, '#1a1a2e');

  // Tail
  const tailCurve = Math.sin(frame * 0.2) * 4;
  px(ax+34, ay+30+bounce, 8, 4, '#0d0d1a');
  px(ax+40, ay+24+bounce+tailCurve, 6, 4, '#1a1a2e');
  px(ax+44, ay+18+bounce+tailCurve, 4, 6, '#7b2fff');

  // Attack: sword slash
  if (attacking) {
    const af = attackDir; // 1 = right, -1 = left
    const sx = af > 0 ? ax+36 : ax-20;
    // Blade
    px(sx, ay+10+bounce, 20, 4, '#e8e8ff');
    px(sx+2, ay+8+bounce, 16, 2, '#ffffff');
    px(sx, ay+10+bounce, 4, 4, '#f5c400'); // guard
    // Glow
    ctx.fillStyle = 'rgba(0,245,255,0.4)';
    ctx.fillRect(sx-2, ay+6+bounce, 24, 12);
    // Slash lines
    ctx.strokeStyle = '#00f5ff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(sx+20, ay+5+bounce);
    ctx.lineTo(sx+36, ay+20+bounce);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(sx+20, ay+10+bounce);
    ctx.lineTo(sx+38, ay+22+bounce);
    ctx.stroke();
  }
}

// Draw ninja dog enemy
function drawNinja(n) {
  const ax = Math.round(n.x), ay = Math.round(n.y);
  const f = Math.floor(frame / 5) % 4;
  const bounce = Math.sin(frame * 0.3) * 2;

  if (n.dying > 0) {
    ctx.globalAlpha = n.dying / 20;
    ctx.globalCompositeOperation = 'lighter';
  }

  // Shadow
  ctx.globalAlpha = n.dying > 0 ? (n.dying/20)*0.3 : 0.3;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(ax+18, ay+44, 14, 3, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.globalAlpha = n.dying > 0 ? n.dying/20 : 1;

  // Body
  px(ax+4,  ay+20+bounce, 28, 22, '#1a0a0a');
  px(ax+6,  ay+22+bounce, 24, 18, '#2d1010');

  // Red bandana
  px(ax+4,  ay+10+bounce, 28, 8, '#cc1122');
  px(ax+2,  ay+12+bounce, 32, 4, '#ff2233');
  // Bandana tail
  px(ax+30, ay+10+bounce, 6, 12, '#cc1122');

  // Head
  px(ax+6,  ay+2+bounce,  24, 18, '#1a0a0a');
  px(ax+8,  ay+bounce,    20, 20, '#2d1010');

  // Ears
  px(ax+8,  ay-4+bounce,  5, 6, '#1a0a0a');
  px(ax+23, ay-4+bounce,  5, 6, '#1a0a0a');

  // Eyes - red glow
  px(ax+9,  ay+8+bounce,  5, 5, '#ff2233');
  px(ax+22, ay+8+bounce,  5, 5, '#ff2233');
  px(ax+10, ay+9+bounce,  3, 3, '#ff5566');
  px(ax+23, ay+9+bounce,  3, 3, '#ff5566');
  px(ax+11, ay+10+bounce, 2, 2, '#000');
  px(ax+24, ay+10+bounce, 2, 2, '#000');

  // Eye glow
  ctx.fillStyle = 'rgba(255,34,51,0.3)';
  ctx.beginPath();
  ctx.ellipse(ax+12, ay+11+bounce, 5, 4, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(ax+25, ay+11+bounce, 5, 4, 0, 0, Math.PI*2);
  ctx.fill();

  // Fangs
  px(ax+14, ay+16+bounce, 3, 4, '#e8e8e8');
  px(ax+19, ay+16+bounce, 3, 4, '#e8e8e8');

  // Legs
  const legOff = Math.sin(frame * 0.45) * 5;
  px(ax+6,  ay+40+bounce+legOff,  8, 10, '#1a0a0a');
  px(ax+22, ay+40+bounce-legOff,  8, 10, '#1a0a0a');

  // Shuriken weapon
  const sa = frame * 0.15;
  ctx.save();
  ctx.translate(ax-8, ay+18+bounce);
  ctx.rotate(sa);
  ctx.fillStyle = '#aaaacc';
  for (let i = 0; i < 4; i++) {
    ctx.save();
    ctx.rotate(i * Math.PI/2);
    ctx.fillRect(-2, -8, 4, 16);
    ctx.restore();
  }
  ctx.restore();

  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';
}

// Draw pixel obstacle
function drawObstacle(o) {
  const ax = Math.round(o.x), ay = Math.round(o.y);
  if (o.type === 'spike') {
    for (let i = 0; i < o.count; i++) {
      const sx = ax + i * 16;
      // Spike
      ctx.fillStyle = '#cc2244';
      ctx.beginPath();
      ctx.moveTo(sx, ay+24);
      ctx.lineTo(sx+8, ay);
      ctx.lineTo(sx+16, ay+24);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#ff2d78';
      ctx.beginPath();
      ctx.moveTo(sx+2, ay+24);
      ctx.lineTo(sx+8, ay+4);
      ctx.lineTo(sx+14, ay+24);
      ctx.closePath();
      ctx.fill();
      // Glow
      ctx.fillStyle = 'rgba(255,45,120,0.15)';
      ctx.beginPath();
      ctx.moveTo(sx-2, ay+24);
      ctx.lineTo(sx+8, ay-6);
      ctx.lineTo(sx+18, ay+24);
      ctx.closePath();
      ctx.fill();
    }
    // Base
    ctx.fillStyle = '#3d1020';
    ctx.fillRect(ax, ay+22, o.count*16, 6);
  } else if (o.type === 'wall') {
    // Pixel wall blocks
    for (let row = 0; row < o.rows; row++) {
      for (let col = 0; col < 2; col++) {
        const bx = ax + col * 16;
        const by = ay + row * 16;
        const dark = (row + col) % 2 === 0;
        ctx.fillStyle = dark ? '#1a1a3d' : '#2a2a5d';
        ctx.fillRect(bx, by, 16, 16);
        ctx.fillStyle = 'rgba(123,47,255,0.3)';
        ctx.fillRect(bx, by, 16, 2);
        ctx.fillRect(bx, by, 2, 16);
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fillRect(bx+14, by, 2, 16);
        ctx.fillRect(bx, by+14, 16, 2);
        // Rune symbol
        if (row === 0 && col === 0) {
          ctx.fillStyle = 'rgba(123,47,255,0.6)';
          ctx.fillRect(bx+5, by+4, 6, 8);
          ctx.fillRect(bx+3, by+6, 10, 4);
        }
      }
    }
    // Glow
    ctx.fillStyle = 'rgba(123,47,255,0.1)';
    ctx.fillRect(ax-2, ay-2, 36, o.rows*16+4);
  }
}

// Draw pickup
function drawPickup(p) {
  const ax = Math.round(p.x), ay = Math.round(p.y);
  const bob = Math.sin(frame * 0.08 + p.phase) * 5;
  if (p.type === 'coin') {
    // Star coin
    ctx.fillStyle = '#f5c400';
    ctx.beginPath();
    ctx.arc(ax+10, ay+10+bob, 8, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#ffd740';
    ctx.beginPath();
    ctx.arc(ax+10, ay+10+bob, 5, 0, Math.PI*2);
    ctx.fill();
    // Star
    ctx.fillStyle = '#fff';
    const sa = frame * 0.06;
    for (let i = 0; i < 5; i++) {
      const a = sa + i * Math.PI*2/5 - Math.PI/2;
      const oa = a + Math.PI/5;
      ctx.beginPath();
      ctx.moveTo(ax+10 + Math.cos(a)*5, ay+10+bob + Math.sin(a)*5);
      ctx.lineTo(ax+10 + Math.cos(oa)*2, ay+10+bob + Math.sin(oa)*2);
      ctx.lineTo(ax+10 + Math.cos(a+Math.PI*2/5)*5, ay+10+bob + Math.sin(a+Math.PI*2/5)*5);
      ctx.closePath();
      ctx.fill();
    }
    // Glow
    ctx.fillStyle = 'rgba(245,196,0,0.25)';
    ctx.beginPath();
    ctx.arc(ax+10, ay+10+bob, 14, 0, Math.PI*2);
    ctx.fill();
  } else if (p.type === 'gem') {
    // Purple gem / ETH coin
    ctx.fillStyle = '#7b2fff';
    ctx.beginPath();
    ctx.moveTo(ax+10, ay+0+bob);
    ctx.lineTo(ax+20, ay+10+bob);
    ctx.lineTo(ax+10, ay+22+bob);
    ctx.lineTo(ax+0, ay+10+bob);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#a55fff';
    ctx.beginPath();
    ctx.moveTo(ax+10, ay+2+bob);
    ctx.lineTo(ax+18, ay+10+bob);
    ctx.lineTo(ax+10, ay+8+bob);
    ctx.closePath();
    ctx.fill();
    // Glow
    ctx.fillStyle = 'rgba(123,47,255,0.3)';
    ctx.beginPath();
    ctx.arc(ax+10, ay+11+bob, 14, 0, Math.PI*2);
    ctx.fill();
  } else if (p.type === 'shield') {
    // Shield
    ctx.fillStyle = '#00f5ff';
    ctx.beginPath();
    ctx.moveTo(ax+10, ay+0+bob);
    ctx.lineTo(ax+20, ay+6+bob);
    ctx.lineTo(ax+20, ay+14+bob);
    ctx.lineTo(ax+10, ay+22+bob);
    ctx.lineTo(ax+0, ay+14+bob);
    ctx.lineTo(ax+0, ay+6+bob);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.fillRect(ax+8, ay+4+bob, 4, 14);
    ctx.fillRect(ax+3, ay+9+bob, 14, 4);
    // Glow
    ctx.fillStyle = 'rgba(0,245,255,0.25)';
    ctx.beginPath();
    ctx.arc(ax+10, ay+11+bob, 16, 0, Math.PI*2);
    ctx.fill();
  }
}

// Draw particle
function drawParticle(p) {
  ctx.fillStyle = p.color;
  ctx.globalAlpha = p.life;
  ctx.fillRect(Math.round(p.x), Math.round(p.y), p.size, p.size);
  ctx.globalAlpha = 1;
}

// ─── SPAWN HELPERS ────────────────────────────────────────
let spawnTimer = 0, spawnInterval = 90;
let pickupTimer = 0;

function spawnObstacle() {
  const r = Math.random();
  if (r < 0.45) {
    const cnt = 1 + Math.floor(Math.random() * 3);
    obstacles.push({ type:'spike', x:W+20, y:GROUND+2, w:cnt*16, h:24, count:cnt });
  } else if (r < 0.75) {
    const rows = 1 + Math.floor(Math.random() * 2);
    const h = rows * 16;
    obstacles.push({ type:'wall', x:W+20, y:GROUND+4-h, w:32, h, rows });
  } else {
    // Ninja enemy
    ninjas.push({ x:W+20, y:GROUND, w:36, h:48, vy:0, dying:0, phase: Math.random()*10 });
  }
}

function spawnPickup() {
  const r = Math.random();
  const type = r < 0.55 ? 'coin' : r < 0.85 ? 'gem' : 'shield';
  const yOff = type === 'coin' ? Math.random() < 0.5 ? 0 : -60 : 0;
  pickups.push({ type, x:W+20, y:GROUND-20+yOff, w:20, h:24, phase: Math.random()*Math.PI*2 });
}

function spawnParticles(x, y, color, count=8) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI*2/count)*i + Math.random()*0.5;
    const spd = 2 + Math.random()*4;
    particles.push({
      x, y,
      vx: Math.cos(angle)*spd,
      vy: Math.sin(angle)*spd - 2,
      color,
      size: 4 + Math.floor(Math.random()*4),
      life: 1
    });
  }
}

// ─── COLLISION ────────────────────────────────────────────
function rectsOverlap(a, b, margin=8) {
  return a.x+margin < b.x+b.w-margin &&
         a.x+a.w-margin > b.x+margin &&
         a.y+margin < b.y+b.h-margin &&
         a.y+a.h-margin > b.y+margin;
}

// ─── DRAW BACKGROUND ──────────────────────────────────────
function drawBg() {
  // Sky gradient
  const grad = ctx.createLinearGradient(0,0,0,GROUND);
  grad.addColorStop(0, '#05050f');
  grad.addColorStop(0.6, '#0a0818');
  grad.addColorStop(1, '#120a20');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,GROUND);

  // Stars
  bgStars.forEach(s => {
    s.x -= s.spd;
    if (s.x < 0) { s.x = W; s.y = Math.random()*(GROUND-60); }
    const twinkle = 0.4 + 0.6 * Math.sin(Date.now()*0.002 + s.bright * 10);
    ctx.fillStyle = `rgba(232,232,255,${twinkle * 0.8})`;
    ctx.fillRect(Math.round(s.x), Math.round(s.y), s.r, s.r);
    if (s.r > 1) {
      ctx.fillStyle = `rgba(232,232,255,${twinkle * 0.3})`;
      ctx.fillRect(Math.round(s.x)-1, Math.round(s.y), s.r+2, s.r);
      ctx.fillRect(Math.round(s.x), Math.round(s.y)-1, s.r, s.r+2);
    }
  });

  // Moon
  const moonX = 680, moonY = 50;
  ctx.fillStyle = 'rgba(232,232,255,0.08)';
  ctx.beginPath(); ctx.arc(moonX, moonY, 36, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(232,232,255,0.12)';
  ctx.beginPath(); ctx.arc(moonX, moonY, 28, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(200,200,255,0.2)';
  ctx.beginPath(); ctx.arc(moonX, moonY, 22, 0, Math.PI*2); ctx.fill();

  // Distant city silhouette
  ctx.fillStyle = 'rgba(26,10,40,0.9)';
  const buildings = [
    [60,60,30,80],[100,40,20,100],[130,50,40,90],[180,30,25,110],
    [220,55,35,85],[270,45,30,95],[310,35,20,105],[340,60,40,80],
    [400,40,25,100],[440,50,35,90],[490,30,20,110],[520,55,30,85],
    [560,45,40,95],[620,35,25,105],[660,60,35,80],[710,40,30,100],
    [750,50,20,90],
  ];
  buildings.forEach(([bx,bh,bw,_]) => {
    ctx.fillRect(bx, GROUND-bh, bw, bh);
    // Windows
    ctx.fillStyle = 'rgba(245,196,0,0.15)';
    for (let wy = GROUND-bh+6; wy < GROUND-6; wy += 10) {
      for (let wx = bx+4; wx < bx+bw-4; wx += 8) {
        if (Math.random() < 0.6) ctx.fillRect(wx, wy, 4, 4);
      }
    }
    ctx.fillStyle = 'rgba(26,10,40,0.9)';
  });

  // Clouds
  clouds.forEach(c => {
    c.x -= c.spd;
    if (c.x + c.w < 0) c.x = W + 20;
    ctx.fillStyle = `rgba(123,47,255,${c.alpha})`;
    ctx.beginPath();
    ctx.ellipse(c.x + c.w*0.5, c.y, c.w*0.5, 16, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(c.x + c.w*0.3, c.y+5, c.w*0.35, 14, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(c.x + c.w*0.7, c.y+5, c.w*0.3, 12, 0, 0, Math.PI*2);
    ctx.fill();
  });

  // Ground
  const gg = ctx.createLinearGradient(0, GROUND, 0, H);
  gg.addColorStop(0, '#1a0a2e');
  gg.addColorStop(0.3, '#12081f');
  gg.addColorStop(1, '#080510');
  ctx.fillStyle = gg;
  ctx.fillRect(0, GROUND, W, H-GROUND);

  // Ground line glow
  ctx.fillStyle = '#7b2fff';
  ctx.fillRect(0, GROUND, W, 2);
  ctx.fillStyle = 'rgba(123,47,255,0.4)';
  ctx.fillRect(0, GROUND+2, W, 3);
  ctx.fillStyle = 'rgba(123,47,255,0.15)';
  ctx.fillRect(0, GROUND+5, W, 6);

  // Ground tiles
  ctx.fillStyle = 'rgba(123,47,255,0.08)';
  for (let tx = (-(distance*0.5) % 64 + 64) % 64; tx < W; tx += 64) {
    ctx.fillRect(tx, GROUND, 1, H-GROUND);
  }

  // Foreground grid lines (moving)
  ctx.strokeStyle = 'rgba(123,47,255,0.12)';
  ctx.lineWidth = 1;
  const gridOff = (-(distance*0.15) % 80 + 80) % 80;
  for (let gx = gridOff; gx < W; gx += 80) {
    ctx.beginPath();
    ctx.moveTo(gx, GROUND);
    ctx.lineTo(gx - 40, H);
    ctx.stroke();
  }
}

// ─── DRAW HUD FX ──────────────────────────────────────────
function drawInvincibleFX() {
  if (invincible <= 0) return;
  const t = invincible / 180;
  ctx.strokeStyle = `rgba(0,245,255,${t * 0.6})`;
  ctx.lineWidth = 3;
  ctx.strokeRect(cat.x-4, cat.y-4, cat.w+8, cat.h+8);
  ctx.fillStyle = `rgba(0,245,255,${t * 0.1})`;
  ctx.fillRect(cat.x-4, cat.y-4, cat.w+8, cat.h+8);
}

// ─── MAIN GAME LOOP ───────────────────────────────────────
function gameLoop() {
  requestAnimationFrame(gameLoop);
  if (gameState !== 'playing') {
    // Still draw background on idle
    ctx.clearRect(0,0,W,H);
    drawBg();
    frame++;
    return;
  }

  frame++;
  distance++;
  score = Math.floor(distance * 0.1) + Math.floor(distance * combo * 0.005);
  scrollSpeed = SCROLL_SPEED_INIT + Math.floor(distance / 800) * 0.5;
  spawnInterval = Math.max(55, 90 - Math.floor(distance / 400) * 5);

  // ─ Physics ─
  if (!cat.grounded) {
    cat.vy += GRAVITY;
    cat.y += cat.vy;
  }
  if (cat.y >= GROUND) {
    cat.y = GROUND;
    cat.vy = 0;
    cat.grounded = true;
    cat.jumping = false;
  }

  // Combo decay
  if (comboTimer > 0) {
    comboTimer--;
    if (comboTimer === 0) combo = 1;
  }

  // Attack timer
  if (attackTimer > 0) { attackTimer--; cat.attacking = true; }
  else { cat.attacking = false; }
  if (attackCooldown > 0) attackCooldown--;

  // Invincible
  if (invincible > 0) invincible--;

  // Flash
  if (flashTimer > 0) flashTimer--;

  // Shake
  if (shakeTimer > 0) shakeTimer--;
  shakeX = shakeTimer > 0 ? (Math.random()-0.5)*8 : 0;

  // ─ Spawn ─
  spawnTimer++;
  if (spawnTimer >= spawnInterval) {
    spawnTimer = 0;
    spawnObstacle();
  }
  pickupTimer++;
  if (pickupTimer >= 50) {
    pickupTimer = 0;
    if (Math.random() < 0.7) spawnPickup();
  }

  // ─ Update obstacles ─
  obstacles = obstacles.filter(o => {
    o.x -= scrollSpeed;
    if (o.x + o.w < 0) return false;

    if (invincible <= 0) {
      // Check cat hitbox
      const catHit = { x:cat.x+8, y:cat.y+4, w:cat.w-16, h:cat.h-8 };
      const obsHit = { x:o.x, y:o.y, w:o.w, h:o.h };
      if (rectsOverlap(catHit, obsHit, 4)) {
        takeDamage(o.x + o.w/2, o.y);
        return false;
      }
    }
    return true;
  });

  // ─ Update ninjas ─
  ninjas = ninjas.filter(n => {
    n.x -= scrollSpeed + 0.5;
    if (n.x + n.w < 0) return false;

    if (n.dying > 0) {
      n.dying--;
      n.y -= 2;
      return n.dying > 0;
    }

    // Attack check
    if (cat.attacking) {
      const catAttackBox = { x:cat.x + (30), y:cat.y, w:40, h:cat.h };
      const nHit = { x:n.x, y:n.y, w:n.w, h:n.h };
      if (rectsOverlap(catAttackBox, nHit, 4)) {
        spawnParticles(n.x+n.w/2, n.y+n.h/2, '#ff2d78', 12);
        spawnParticles(n.x+n.w/2, n.y+n.h/2, '#ffffff', 6);
        n.dying = 20;
        combo = Math.min(combo + 1, 10);
        comboTimer = 180;
        score += 100 * combo;
        showComboPopup(n.x, n.y);
        return true;
      }
    }

    if (invincible <= 0) {
      const catHit = { x:cat.x+8, y:cat.y+4, w:cat.w-16, h:cat.h-8 };
      const nHit = { x:n.x+4, y:n.y+4, w:n.w-8, h:n.h-8 };
      if (rectsOverlap(catHit, nHit, 4)) {
        spawnParticles(cat.x+cat.w/2, cat.y+cat.h/2, '#ff2d78', 10);
        takeDamage(n.x, n.y);
        return false;
      }
    }
    return true;
  });

  // ─ Update pickups ─
  pickups = pickups.filter(p => {
    p.x -= scrollSpeed;
    if (p.x + p.w < 0) return false;
    const catHit = { x:cat.x+4, y:cat.y+4, w:cat.w-8, h:cat.h-8 };
    const pHit = { x:p.x, y:p.y, w:p.w, h:p.h };
    if (rectsOverlap(catHit, pHit, 0)) {
      if (p.type === 'coin') {
        spawnParticles(p.x+10, p.y+10, '#f5c400', 8);
        score += 50 * combo;
        combo = Math.min(combo + 1, 10);
        comboTimer = 180;
        showComboPopup(p.x, p.y);
      } else if (p.type === 'gem') {
        spawnParticles(p.x+10, p.y+10, '#7b2fff', 10);
        score += 200 * combo;
        combo = Math.min(combo + 1, 10);
        comboTimer = 180;
        showComboPopup(p.x, p.y);
      } else if (p.type === 'shield') {
        spawnParticles(p.x+10, p.y+10, '#00f5ff', 12);
        invincible = 180;
      }
      return false;
    }
    return true;
  });

  // ─ Particles ─
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.15;
    p.life -= 0.035;
    return p.life > 0;
  });

  // Cat trail
  cat.trail.push({ x: cat.x + cat.w/2, y: cat.y + cat.h/2, life: 1 });
  if (cat.trail.length > 10) cat.trail.shift();
  cat.trail.forEach(t => t.life -= 0.1);

  // ─ Cat anim ─
  if (cat.grounded) { cat.animTimer++; if (cat.animTimer > 4) { cat.animTimer=0; cat.animFrame=(cat.animFrame+1)%4; } }

  // ─ DRAW ─
  ctx.save();
  if (shakeTimer > 0) ctx.translate(shakeX, 0);

  ctx.clearRect(0,0,W,H);

  // Flash effect
  if (flashTimer > 0) {
    ctx.fillStyle = `rgba(255,45,120,${flashTimer/30 * 0.4})`;
    ctx.fillRect(0,0,W,H);
  }

  drawBg();
  particles.forEach(drawParticle);
  pickups.forEach(drawPickup);
  obstacles.forEach(drawObstacle);
  ninjas.forEach(drawNinja);

  // Cat trail
  cat.trail.forEach((t, i) => {
    if (t.life <= 0) return;
    ctx.fillStyle = `rgba(123,47,255,${t.life * 0.3})`;
    const s = t.life * 8;
    ctx.fillRect(Math.round(t.x - s/2), Math.round(t.y - s/2), s, s);
  });

  drawCat(cat.x, cat.y, frame, cat.ducking, cat.attacking, invincible, 1);
  drawInvincibleFX();

  ctx.restore();

  // Score update
  document.getElementById('scoreDisplay').textContent = String(score).padStart(5,'0');
  document.getElementById('hiDisplay').textContent = String(Math.max(score, hiScore)).padStart(5,'0');
  document.getElementById('comboDisplay').textContent = `x${combo}`;

  // Check win/hi score
  if (score > hiScore) {
    hiScore = score;
    localStorage.setItem('scHi', hiScore);
  }
}

function takeDamage(ox, oy) {
  if (invincible > 0) return;
  lives--;
  invincible = 90;
  shakeTimer = 12;
  flashTimer = 20;
  combo = 1;
  spawnParticles(cat.x+cat.w/2, cat.y+cat.h/2, '#ff2d78', 16);
  spawnParticles(ox, oy, '#ff5566', 8);
  updateLives();
  if (lives <= 0) { gameOver(); }
}

function updateLives() {
  ['life1','life2','life3'].forEach((id, i) => {
    document.getElementById(id).textContent = i < lives ? '🐱' : '💀';
  });
}

function showComboPopup(x, y) {
  const el = document.getElementById('comboPopup');
  if (combo < 2) return;
  el.style.display = 'block';
  el.style.left = Math.min(x + 40, W - 100) + 'px';
  el.style.top = (y + 57 - 30) + 'px';
  el.textContent = combo >= 8 ? `💥 ULTRA x${combo}!` : combo >= 5 ? `⚡ SUPER x${combo}!` : `✦ COMBO x${combo}!`;
  el.style.color = combo >= 8 ? '#ff2d78' : combo >= 5 ? '#00f5ff' : '#f5c400';
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.style.display = 'none'; }, 700);
}

// ─── CONTROLS ─────────────────────────────────────────────
function jump() {
  if (!cat.grounded) return;
  cat.vy = JUMP_FORCE;
  cat.grounded = false;
  cat.jumping = true;
  spawnParticles(cat.x+cat.w/2, cat.y+cat.h, '#7b2fff', 6);
}

function duck(on) {
  cat.ducking = on;
  if (on) { cat.y = GROUND + 14; cat.h = 34; }
  else { if (cat.grounded) cat.y = GROUND; cat.h = 48; }
}

function attack() {
  if (attackCooldown > 0) return;
  attackTimer = 14;
  attackCooldown = 20;
  spawnParticles(cat.x+50, cat.y+cat.h/2, '#00f5ff', 6);
}

document.addEventListener('keydown', e => {
  if (gameState !== 'playing') return;
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.key === 'w' || e.key === 'W') { e.preventDefault(); jump(); }
  if (e.code === 'ArrowDown' || e.key === 's' || e.key === 'S') { e.preventDefault(); duck(true); }
  if (e.key === 'z' || e.key === 'Z' || e.key === 'x' || e.key === 'X') { e.preventDefault(); attack(); }
});

document.addEventListener('keyup', e => {
  if (e.code === 'ArrowDown' || e.key === 's' || e.key === 'S') duck(false);
});

canvas.addEventListener('click', () => {
  if (gameState === 'playing') jump();
  else if (gameState === 'idle') startGame();
  else if (gameState === 'dead') restartGame();
});

function handleTouch(action) {
  if (gameState !== 'playing') return;
  if (action === 'jump') jump();
  if (action === 'duck') duck(true);
  if (action === 'attack') attack();
}
function handleTouchEnd(action) {
  if (action === 'duck') duck(false);
}

// ─── GAME FLOW ────────────────────────────────────────────
function startGame() {
  gameState = 'playing';
  score = 0; lives = 3; combo = 1; comboTimer = 0;
  frame = 0; distance = 0;
  scrollSpeed = SCROLL_SPEED_INIT;
  obstacles = []; pickups = []; particles = []; ninjas = [];
  spawnTimer = 0; pickupTimer = 0;
  invincible = 0; flashTimer = 0; shakeTimer = 0;
  attackTimer = 0; attackCooldown = 0;
  cat.y = GROUND; cat.vy = 0; cat.grounded = true;
  cat.ducking = false; cat.attacking = false; cat.h = 48; cat.trail = [];
  updateLives();
  document.getElementById('overlay').classList.add('hidden');
}

function restartGame() {
  startGame();
}

function gameOver() {
  gameState = 'dead';
  if (score > hiScore) { hiScore = score; localStorage.setItem('scHi', hiScore); }
  const overlay = document.getElementById('overlay');
  overlay.classList.remove('hidden');
  overlay.innerHTML = `
    <div class="overlay-title" style="color:var(--pink)">GAME<br>OVER</div>
    <div class="overlay-score-big">${String(score).padStart(5,'0')}</div>
    <div class="overlay-hi">BEST: ${String(hiScore).padStart(5,'0')}</div>
    ${score > 5000 ? `<div class="nft-promo">🎉 SCORE UNLOCKED! 优惠码: SHADOWCAT20 🎉</div>` :
      `<div style="font-size:6px;color:rgba(232,232,255,0.4);text-align:center;">得分超过 5000 解锁 NFT 优惠码<br>当前: ${score} / 5000</div>`}
    <button class="overlay-btn" onclick="restartGame()">▶ PLAY AGAIN</button>
    <a href="pixel-cat-nft.html" style="font-size:7px;color:var(--purple-light);letter-spacing:1px;text-decoration:none;">← 返回 NFT 商城</a>
  `;
}
